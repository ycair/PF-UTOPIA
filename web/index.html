<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PF UTOPIA — 安逸烏托邦</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav id="top-nav">
  <span class="nav-brand">PF UTOPIA</span>
  <div class="nav-tabs">
    <button class="nav-tab active" data-page="map">🗺️ 地圖</button>
    <button class="nav-tab" data-page="profile">📊 角色</button>
    <button class="nav-tab" data-page="market">📈 市場</button>
    <button class="nav-tab" data-page="ranking">🏆 排行</button>
  </div>
  <button id="login-btn" class="nav-login">🔐 Discord 登入</button>
  <span id="user-greeting" class="nav-user hidden"></span>
</nav>
<div id="app">
  <div id="page-map" class="page active">
    <div id="map-container"><canvas id="map-canvas"></canvas><div id="node-tooltip" class="hidden"></div></div>
  </div>
  <div id="page-profile" class="page">
    <div class="content-panel"><div class="panel"><div class="panel-header">📊 角色狀態</div><div id="profile-full">請先登入 Discord</div></div></div>
  </div>
  <div id="page-market" class="page">
    <div class="content-panel">
      <div class="panel"><div class="panel-header">📈 股市行情</div><div id="market-data">載入中...</div></div>
      <div class="panel"><div class="panel-header">🏪 物資賣價</div><div id="shop-data">載入中...</div></div>
    </div>
  </div>
  <div id="page-ranking" class="page">
    <div class="content-panel">
      <div class="panel"><div class="panel-header">⚔️ 戰力排行</div><div id="rank-power">載入中...</div></div>
      <div class="panel"><div class="panel-header">🪙 財富排行</div><div id="rank-wealth">載入中...</div></div>
    </div>
  </div>
</div>
<script src="map.js"></script>
</body>
</html>

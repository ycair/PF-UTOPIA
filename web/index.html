<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PF UTOPIA - 安逸烏托邦</title>
  <meta name="description" content="PF UTOPIA Discord MMORPG - 探索14個神秘地點，戰鬥、交易、投資，開創你的烏托邦傳奇">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <!-- Navigation Bar -->
  <nav id="top-nav">
    <div class="nav-brand">
      <span class="nav-brand-text">PF UTOPIA</span>
    </div>
    
    <div class="nav-tabs">
      <button class="nav-tab active" data-page="map">
        <span class="nav-tab-icon">&#x1F5FA;</span>
        <span>地圖</span>
      </button>
      <button class="nav-tab" data-page="profile">
        <span class="nav-tab-icon">&#x1F4CA;</span>
        <span>角色</span>
      </button>
      <button class="nav-tab" data-page="market">
        <span class="nav-tab-icon">&#x1F4C8;</span>
        <span>市場</span>
      </button>
      <button class="nav-tab" data-page="ranking">
        <span class="nav-tab-icon">&#x1F3C6;</span>
        <span>排行</span>
      </button>
    </div>
    
    <button id="login-btn" class="nav-login">
      <span class="nav-login-icon">&#x1F512;</span>
      <span>Discord 登入</span>
    </button>
    
    <div id="user-greeting" class="nav-user hidden">
      <span class="nav-user-icon">&#x1F464;</span>
      <span id="user-name">已登入</span>
    </div>
    
    <button id="logout-btn" class="nav-logout hidden">
      <span>登出</span>
    </button>
  </nav>

  <!-- Main App Container -->
  <div id="app">
    <!-- Map Page -->
    <div id="page-map" class="page active">
      <div id="map-container">
        <canvas id="map-canvas"></canvas>
        <div id="map-frame"></div>
        
        <!-- Node Tooltip -->
        <div id="node-tooltip" class="hidden">
          <div class="tooltip-header">
            <span class="tooltip-icon"></span>
            <span class="tooltip-name"></span>
          </div>
          <div class="tooltip-status"></div>
        </div>
        
        <!-- Zoom Controls -->
        <div id="zoom-controls">
          <button class="zoom-btn" id="zoom-in">+</button>
          <div id="zoom-level">100%</div>
          <button class="zoom-btn" id="zoom-out">-</button>
        </div>
        
        <!-- Minimap -->
        <div id="minimap">
          <canvas id="minimap-canvas"></canvas>
          <div id="minimap-viewport"></div>
        </div>
      </div>
    </div>

    <!-- Profile Page -->
    <div id="page-profile" class="page">
      <div class="content-panel">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-header-icon">&#x1F4CA;</span>
            <span class="panel-header-text">角色狀態</span>
          </div>
          <div class="panel-body">
            <div id="profile-full">
              <div class="loading">請先登入 Discord</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Market Page -->
    <div id="page-market" class="page">
      <div class="content-panel">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-header-icon">&#x1F4C8;</span>
            <span class="panel-header-text">股市行情</span>
          </div>
          <div class="panel-body">
            <div id="market-data" class="loading">載入中...</div>
          </div>
        </div>
        
        <div class="panel">
          <div class="panel-header">
            <span class="panel-header-icon">&#x1F3EA;</span>
            <span class="panel-header-text">物資賣價</span>
          </div>
          <div class="panel-body">
            <div id="shop-data" class="loading">載入中...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Rankings Page -->
    <div id="page-ranking" class="page">
      <div class="content-panel">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-header-icon">&#x2694;</span>
            <span class="panel-header-text">戰力排行</span>
          </div>
          <div class="panel-body">
            <div id="rank-power" class="loading">載入中...</div>
          </div>
        </div>
        
        <div class="panel">
          <div class="panel-header">
            <span class="panel-header-icon">&#x1FA99;</span>
            <span class="panel-header-text">財富排行</span>
          </div>
          <div class="panel-body">
            <div id="rank-wealth" class="loading">載入中...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="map.js?v=2"></script>
  <footer id="site-footer">
    <a href="/tos.html">服務條款</a>
    <span class="footer-sep">|</span>
    <a href="/privacy.html">隱私權政策</a>
  </footer>
</body>
</html>
